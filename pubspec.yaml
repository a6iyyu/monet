name: monet
description: "Monet is a simple application to track your money with NFC banking card."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  dropdown_search: ^7.0.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  font_awesome_flutter: ^11.0.0
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  intl: ^0.20.3
  logger: ^2.7.0

dev_dependencies:
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  go_router_builder: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/